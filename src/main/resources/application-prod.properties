# Production profile configuration
app.data-dir=/data
# H2 Database configuration for production
spring.r2dbc.url=r2dbc:h2:file:///${app.data-dir}/archipelobby
spring.flyway.url=jdbc:h2:file:${app.data-dir}/archipelobby
server.forward-headers-strategy=native
server.reactive.session.cookie.secure=true
archipelobby.multiserver.enabled=true
# Pin the internal wrapper<->Spring token from the environment so it stays stable
# across redeploys and consistent across instances. When unset, InternalToken
# falls back to a random per-process token, which breaks already-running wrappers
# on redeploy.
archipelobby.multiserver.internal-token=${ARCHIPELOBBY_INTERNAL_TOKEN:}
